<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <div class="display-container">
            <input readonly  placeholder="password" class="display" data-passwordDisplay>
            <button>
                <span data-copyMsg></span>
                <img src="./assets/copy.svg" alt="copy" width="23" height="23">
            </button>
        </div>
        <div class="input-container">
            <!-- password length -->
            <div class="length-container">

                <p>Password Length</p>
                <p data-lengthNumber>0</p>
            </div>
            <!-- slider -->
            <input type="range" min="1" max="20" class="slider" step="1" data-lengthSlider>
            <!-- checkbox -->
            <div class="checkbox-container">
                <div>
                    <input type="checkbox" id="uppercase" data-uppercase>
                    <label for="uppercase">Include Uppercase Letters</label>
                </div>
                <div>
                    <input type="checkbox" id="lowercase" data-lowercase>
                    <label for="lowercase">Include Lowercase Letters</label>
                </div>
                <div>
                    <input type="checkbox" id="numbers" data-numbers>
                    <label for="numbers">Include Numbers</label>
                </div>
                <div>
                    <input type="checkbox" id="symbols" data-symbols>
                    <label for="symbols">Include Symbols</label>
                </div>
                <!-- Strength Indicator -->
                <div class="strength-container">
                    <p>Password Strength</p>
                    <div class="strength-bar" data-indicator></div>
                </div> 
                <!-- Button to generate password    -->
                <button class="generate-btn" data-generateBtn>Generate Password</button>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
